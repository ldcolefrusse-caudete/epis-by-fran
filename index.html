  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html,body{
      width:100%;height:100%;
      background:#1f4e79;
      font-family:Inter,Arial,sans-serif;
      overflow:hidden;
    }
    /* Pantalla de carga / splash */
    #splash{
      display:flex;flex-direction:column;
      align-items:center;justify-content:center;
      width:100%;height:100%;
      gap:20px;
      padding:20px;
    }
    #splash img{
      width:140px;height:140px;
      object-fit:contain;
      border-radius:24px;
      background:#fff;
      padding:12px;
      box-shadow:0 8px 32px rgba(0,0,0,.3);
    }
    #splash h1{
      color:#fff;
      font-size:26px;
      font-weight:800;
      text-align:center;
      letter-spacing:-0.5px;
    }
    #splash p{
      color:rgba(255,255,255,.7);
      font-size:14px;
      text-align:center;
    }
    .spinner{
      width:36px;height:36px;
      border:3px solid rgba(255,255,255,.25);
      border-top-color:#fff;
      border-radius:50%;
      animation:spin .8s linear infinite;
    }
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Iframe que carga la app real */
    #appFrame{
      display:none;
      position:fixed;
      inset:0;
      width:100%;height:100%;
      border:none;
      background:#f4f6f9;
    }

    /* Botón instalar (visible solo cuando Chrome lo permite) */
    #installBtn{
      display:none;
      position:fixed;
      bottom:24px;left:50%;
      transform:translateX(-50%);
      background:#fff;
      color:#1f4e79;
      border:none;
      border-radius:24px;
      padding:12px 28px;
      font-size:15px;
      font-weight:700;
      box-shadow:0 4px 20px rgba(0,0,0,.25);
      cursor:pointer;
      z-index:999;
      white-space:nowrap;
    }
  </style>
</head>
<body>

  var manifest = {
    name: "EPIs By Fran - Colefruse Internacional",
    short_name: "EPIs By Fran",
    description: "Sistema de gestión de EPIs y ropa de trabajo",
    start_url: "./",
    scope: "./",
    display: "standalone",
    orientation: "any",
    background_color: "#1f4e79",
    theme_color: "#1f4e79",
    lang: "es",
    icons: [
      { src: logoSrc, sizes: "any", type: "image/jpeg", purpose: "any maskable" }
    ]
  };
  var blob = new Blob([JSON.stringify(manifest)], {type: "application/json"});
  var manifestURL = URL.createObjectURL(blob);
  document.getElementById("manifestLink").href = manifestURL;

  // ── 2. Cargar la app en el iframe después de 1.2s ──
  var frame = document.getElementById("appFrame");
  var splash = document.getElementById("splash");

  frame.addEventListener("load", function(){
    // Ocultar splash, mostrar app
    splash.style.transition = "opacity .4s";
    splash.style.opacity = "0";
    setTimeout(function(){
      splash.style.display = "none";
      frame.style.display = "block";
    }, 400);
  });

  // Timeout de seguridad: si el iframe tarda más de 8s, mostrar igualmente
  setTimeout(function(){
    if(frame.style.display !== "block"){
      splash.style.display = "none";
      frame.style.display = "block";
    }
  }, 8000);

  // ── 3. Capturar evento de instalación PWA ──
  var deferredPrompt = null;
  var installBtn = document.getElementById("installBtn");

  window.addEventListener("beforeinstallprompt", function(e){
    e.preventDefault();
    deferredPrompt = e;
    // Mostrar botón instalar solo si no está ya en standalone
    if(!window.matchMedia("(display-mode: standalone)").matches){
      installBtn.style.display = "block";
    }
  });

  installBtn.addEventListener("click", function(){
    if(deferredPrompt){
      deferredPrompt.prompt();
      deferredPrompt.userChoice.then(function(){
        deferredPrompt = null;
        installBtn.style.display = "none";
      });
    }
  });

  // ── 4. Si ya está instalada como standalone, quitar splash rápido ──
  if(window.matchMedia("(display-mode: standalone)").matches){
    installBtn.style.display = "none";
  }

  // ── 5. Prevenir zoom doble tap en tablet ──
  var lastTap = 0;
  document.addEventListener("touchend", function(e){
    var now = Date.now();
    if(now - lastTap < 300) e.preventDefault();
    lastTap = now;
  }, {passive:false});

})();
</script>
